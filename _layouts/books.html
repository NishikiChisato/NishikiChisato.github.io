---
layout: page
refactor: true
---

<div class="journal-book-list">
  {% for book in site.data.books %}
  <article class="journal-book-item">
    <div class="journal-book-header">
      <h3 class="journal-book-title">
        {% if book.link %}
          <a href="{{ book.link }}" target="_blank" rel="noopener noreferrer">
            {{ book.title }}
          </a>
        {% else %}
          {{ book.title }}
        {% endif %}
      </h3>
      <span class="journal-book-author">by {{ book.author }}</span>
    </div>
    
    {% if book.desc %}
      <p class="journal-book-desc">
        {{ book.desc }}
      </p>
    {% endif %}
    
    {% if book.post %}
      <div class="journal-book-action">
        <a href="{{ book.post | relative_url }}">
          [ 阅读全文 / Read Notes ]
        </a>
      </div>
    {% endif %}
  </article>
  {% endfor %}
</div>

<style>
  .journal-book-list {
    font-family: "Georgia", "Times New Roman", serif; /* 经典报纸衬线字体 */
    max-width: 800px;
  }
  
  .journal-book-item {
    padding: 1.2rem 0; /* 极大地缩减了上下留白 */
    border-bottom: 1px solid var(--border-color); /* 报刊常见的细黑线 */
  }
  
  .journal-book-item:last-child {
    border-bottom: none;
  }
  
  .journal-book-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.3rem; /* 标题和正文紧紧贴合 */
    flex-wrap: wrap;
  }
  
  .journal-book-title {
    margin: 0;
    font-size: 1.25rem; /* 字体改小，更加精致 */
    font-weight: 700;
    letter-spacing: -0.5px; /* 标题字距缩紧，更有墨水印刷感 */
    color: var(--heading-color);
  }
  
  .journal-book-title a {
    color: inherit;
    text-decoration: none;
  }
  
  .journal-book-title a:hover {
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }
  
  .journal-book-author {
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text-muted-color);
  }
  
  .journal-book-desc {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.5; /* 报刊常见的紧凑行高 */
    color: var(--text-color);
    text-align: justify; /* 文字两端对齐，强烈的报纸排版感 */
  }
  
  .journal-book-action {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    font-family: system-ui, -apple-system, sans-serif; /* 按钮部分用回现代无衬线字体，形成对比 */
  }
  
  .journal-book-action a {
    color: var(--link-color);
    font-weight: 600;
  }
  
  @media (max-width: 576px) {
    .journal-book-header {
      flex-direction: column;
      align-items: flex-start;
    }
    .journal-book-author {
      margin-top: 0.2rem;
    }
  }
</style>
